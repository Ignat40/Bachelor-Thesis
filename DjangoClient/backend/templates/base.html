<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpeakBright{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav">
            <a href="/" class="logo">SpeakBright</a>
            <nav>
                <a href="/">Home</a>
                <a href="/about/">About</a>
                {% if user.is_authenticated %}
                    <a href="/therapy/dashboard/">Dashboard</a>
                    <a href="/accounts/logout/">Logout</a>
                {% else %}
                    <a href="/accounts/login/" class="btn btn-primary">Therapist Login</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
